# planning/outline.md 的 frontmatter JSON Schema 定义
type: object
required: [project_name, sections, generated_by]
properties:
  project_name:
    type: string
    minLength: 2
  generated_by:
    type: string
    enum: [architect, user]
  sections:
    type: array
    minItems: 1
    items:
      type: object
      required: [name, core_claim, target_length]
      properties:
        name:
          type: string
        core_claim:
          type: string
        target_length:
          type: string
        material_refs:
          type: array
          items:
            type: string
